<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b2fff" />
      <stop offset="100%" stop-color="#ff2d78" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0a0a0f" />
  <!-- Neon border -->
  <rect x="5" y="5" width="90" height="90" rx="15" fill="none" stroke="url(#neonGrad)" stroke-width="2" opacity="0.3" />
  <!-- Soundwave Graphic -->
  <path d="M25,50 L25,50 M35,40 L35,60 M45,25 L45,75 M55,30 L55,70 M65,42 L65,58 M75,48 L75,52" stroke="url(#neonGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
  <circle cx="25" cy="50" r="4" fill="#00d4ff" filter="url(#glow)" />
  <circle cx="75" cy="50" r="4" fill="#00d4ff" filter="url(#glow)" />
</svg>
