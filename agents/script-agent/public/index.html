<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akira Flow | Script Agent Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #007AFF;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .vision-container {
            width: 90%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            outline: none;
            background: rgba(255,255,255,0.1);
        }

        .btn-launch {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,122,255,0.3);
        }

        .btn-launch:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(0,122,255,0.4);
        }

        .result-panel {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--glass-border);
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.85rem;
            color: #4cd964;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="vision-container">
        <h1>Akira Flow <span style="font-weight: 600;">Script Agent</span></h1>
        
        <div class="form-group">
            <label>Topic / Prompt</label>
            <input type="text" id="topic" placeholder="e.g. The secret history of Mars exploration">
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <label>Video Type</label>
                <select id="video_type">
                    <option value="youtube_hook">YouTube Hook</option>
                    <option value="story_anime">Anime Story</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Language</label>
                <select id="language">
                    <option value="english">English</option>
                    <option value="hindi">Hindi (Hinglish)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Model</label>
            <select id="model">
                <option value="openai-fast">OpenAI Fast (Recommended)</option>
                <option value="gemini">Gemini Reasoning</option>
                <option value="mistral">Mistral Multi-lingual</option>
            </select>
        </div>

        <div class="form-group">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="research" style="width: auto; margin-right: 10px;"> Enable Autonomous Research
            </label>
        </div>

        <button class="btn-launch" onclick="generate()">GENERATE SCRIPT</button>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 10px; opacity: 0.7;">Orchestrating AI Pipeline...</p>
        </div>

        <div class="result-panel" id="result-panel">
            <h3 style="margin-top: 0; font-weight: 400;">Pipeline Output</h3>
            <pre id="output"></pre>
        </div>
    </div>

    <script>
        async function generate() {
            const topic = document.getElementById('topic').value;
            const video_type = document.getElementById('video_type').value;
            const language = document.getElementById('language').value;
            const model = document.getElementById('model').value;
            const enable_research = document.getElementById('research').checked;

            if (!topic) return alert('Please enter a topic!');

            document.getElementById('loader').style.display = 'block';
            document.getElementById('result-panel').style.display = 'none';

            try {
                const response = await fetch('/api/generate-script', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, video_type, language, model, enable_research })
                });

                const data = await response.json();
                document.getElementById('output').textContent = JSON.stringify(data, null, 2);
                document.getElementById('result-panel').style.display = 'block';
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
